services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mm1000

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/portal/node_modules
    working_dir: /app
    command: pnpm --filter portal dev
    ports:
      - "3001:3001"

  website:
    build:
      context: .
      dockerfile: apps/website/Dockerfile
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/website/node_modules
    working_dir: /app
    command: pnpm --filter website dev
    ports:
      - "3000:3000"
