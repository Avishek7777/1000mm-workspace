# Real directories instead of junctions/symlinks in node_modules — required so
# the standalone deploy bundle survives zipping (see DEPLOY.md).
nodeLinker: hoisted

allowBuilds:
  "@parcel/watcher": true
  "@prisma/client": true
  "@prisma/engines": true
  "@swc/core": true
  bcrypt: true
  esbuild: true
  msw: true
  prisma: true
  sharp: true
  unrs-resolver: true

packages:
  - "apps/*"
  - "packages/*"
